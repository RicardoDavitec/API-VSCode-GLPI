# Template corporativo PMF — Discovery → Evolução
template_id: corporate-phases
defaults:
  projectstates_alias: gep1
  is_milestone: 0
phases:
  - code: "1"
    name: "1. Discovery"
    percent_done: 100
    state: gep7
    is_milestone: 1
    samu_map: "S0 / início S1"
  - code: "2"
    name: "2. Análise"
    percent_done: 100
    state: gep7
    samu_map: "S1–S2"
  - code: "3"
    name: "3. Projeto"
    percent_done: 80
    state: gep3
    samu_map: "S1–S3"
  - code: "4.1"
    name: "4.1 Implementação Front-end"
    percent_done: 60
    state: gep3
    samu_map: "apps/web"
  - code: "4.2"
    name: "4.2 Implementação Back-end"
    percent_done: 50
    state: gep3
    samu_map: "apps/backend"
  - code: "5"
    name: "5. Evolução"
    percent_done: 10
    state: gep1
    samu_map: "S4–S7"
